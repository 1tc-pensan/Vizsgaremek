<h3 class="mb-4">Admin – Kategóriák</h3>

<div class="row">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h5>{{ editingId ? 'Szerkesztés' : 'Új kategória' }}</h5>
        @if (error) { <div class="alert alert-danger">{{ error }}</div> }
        <form (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label">Név *</label>
            <input type="text" class="form-control" [(ngModel)]="form.name" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Leírás</label>
            <textarea class="form-control" [(ngModel)]="form.description" name="description" rows="3"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ editingId ? 'Mentés' : 'Létrehozás' }}</button>
            @if (editingId) {
              <button type="button" class="btn btn-outline-secondary" (click)="cancelEdit()">Mégse</button>
            }
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-7">
    <div class="list-group">
      @for (cat of categories; track cat.id) {
        <div class="list-group-item d-flex justify-content-between align-items-start">
          <div>
            <strong>{{ cat.name }}</strong>
            @if (cat.description) { <br><small class="text-muted">{{ cat.description }}</small> }
            <br><small class="text-muted">{{ cat.reports_count ?? 0 }} bejelentés</small>
          </div>
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-secondary" (click)="edit(cat)">✏️</button>
            <button class="btn btn-sm btn-outline-danger" (click)="delete(cat.id)">🗑</button>
          </div>
        </div>
      }
    </div>
  </div>
</div>
